name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: praxis
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: praxis_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U praxis" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://praxis:ci@localhost:5432/praxis_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-only-jwt-secret-0123456789abcdefghijklmnopqrs
      CSRF_SECRET: ci-only-csrf-secret-0123456789abcdefghijklmnopqr
      CORS_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: ruff check app tests
      - run: alembic upgrade head          # migration applies cleanly on fresh DB
      - run: pytest tests/ -q              # includes tests/security — never skipped

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run build
