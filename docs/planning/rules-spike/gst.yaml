- code: GST-GSTR3B-M
  category: gst
  obligation_name: Monthly summary return
  form_number: GSTR-3B
  applicability:
    all:
      - { attr: has_gst_registration, op: eq, value: unknown }
      - { attr: gst_filing_frequency, op: eq, value: monthly }     # [G1] QRMP split
  anchor: fixed_date
  occurrences: recurrence                                          # [G7] — 12/FY
  recurrence: { every: month, day: 20, count: 12, first_month_ref: fy_start }
  source_citation: "CGST r.61 [UNVERIFIED — spike; QRMP scheme gives 22nd/24th
    by state group — a per-entity attribute the master lacks]"
  signoff: null
  # RECOMMENDATION: exclude monthly/quarterly GST returns from Phase 1.
  # 12+ rows × N companies floods the calendar with dates every practice
  # already tracks elsewhere, and correctness depends on per-GSTIN attributes
  # we don't hold. Annual obligations (9/9C) are where a signed dataset adds
  # value. Encode the exclusion in the dataset with a written reason — this
  # entry exists to force that decision.
