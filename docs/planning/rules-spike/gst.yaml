- code: GST-GSTR9
  category: gst
  obligation_name: GST annual return
  form_number: GSTR-9
  applicability:
    all:
      - { attr: has_gst_registration, op: eq, value: unknown }   # [G1]
      - any:
          - { attr: aggregate_turnover, op: gte, value: 20000000 }  # ₹2 cr [G1]
          - { attr: aggregate_turnover, op: eq, value: unknown }
  anchor: fixed_date
  offset_spec: { type: fixed, month: 12, day: 31, year_ref: fy_end_year }
  source_citation: "CGST Act s.44; r.80 [UNVERIFIED — spike]"
  signoff: null
  # [G1] twice over: GST registration status AND aggregate turnover are both
  # absent from the master. Also: GST registration is PER STATE (GSTIN) —
  # a company can hold several. Phase 1 simplification: one row per company
  # with a "per-GSTIN" remark; a gstin child table is a Phase 2 decision.
  # Flagging so it is chosen, not stumbled into. [G6-adjacent]

